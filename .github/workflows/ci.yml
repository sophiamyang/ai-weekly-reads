name: AI Weekly Reads Health

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * 1"

permissions:
  contents: read

jobs:
  health:
    name: Repo health
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # The health scripts run on a bare interpreter; this step exists to
      # catch requirement pins that no longer resolve.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python scripts
        run: find scripts -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Check repo health
        run: python scripts/check_repo_health.py

      - name: Audit knowledge-base shape
        run: python scripts/audit_knowledge_base.py
